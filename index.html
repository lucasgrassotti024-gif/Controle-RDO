<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de RDO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#1f2329;
color:white;
}

header{
background:#2b3038;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 18px rgba(0,0,0,0.5);
}

.navButtons{
display:flex;
gap:10px;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
background:#3a3f48;
color:white;
transition:0.2s;
}

button:hover{
background:#505662;
transform:translateY(-2px);
}

.container{
max-width:900px;
margin:auto;
padding:50px 20px;
text-align:center;
}

.hidden{
display:none;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:22px;
margin-top:30px;
}

.card{
background:#2b3038;
padding:45px 20px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
cursor:pointer;
font-size:20px;
font-weight:600;
}

.card span{
font-size:32px;
display:block;
margin-bottom:10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.cardRDO{
background:#2b3038;
padding:20px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
cursor:pointer;
}

.cardRDO:hover{
background:#343942;
}


/* 📱 MOBILE RESPONSIVO */
@media (max-width: 768px){

header{
padding:15px 15px;
flex-direction:column;
gap:10px;
text-align:center;
}

header h1{
font-size:22px;
}

.navButtons{
width:100%;
justify-content:center;
flex-wrap:wrap;
}

.container{
padding:25px 15px;
}

.grid{
grid-template-columns:1fr;
gap:15px;
}

.card{
padding:25px 15px;
font-size:18px;
}

.card span{
font-size:26px;
}

.gallery{
grid-template-columns:1fr;
}

.cardRDO{
padding:15px;
font-size:16px;
}

/* BOTÕES */
button{
width:100%;
padding:12px;
font-size:16px;
}

/* MENU PDF MAIS ORGANIZADO */
#menuPDF{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

#menuPDF button{
margin:0 !important;
font-size:14px;
padding:10px;
}

/* TITULOS */
h2{
font-size:22px;
margin-bottom:10px;
}

/* ESPAÇO ENTRE ELEMENTOS */
#mesesPage button{
margin-bottom:15px;
}

}


</style>
</head>

<body>

<header>

<h1>Controle de RDO</h1>

<div class="navButtons">

<button id="btnVoltar" onclick="voltarPagina()">⬅ Voltar</button>

<button onclick="window.location.href='entregas.html'">
Entregas
</button>

</div>

</header>

<!-- AREAS -->

<div class="container" id="areasPage">

<h2>Selecione uma Área</h2>

<div class="grid">

<div class="card" onclick="abrirArea('Civil')">
<span>🏗</span>Civil
</div>

<div class="card" onclick="abrirArea('laminacao')">
<span>🧵</span>Laminação
</div>

<div class="card" onclick="abrirArea('Isolamento')">
<span>🧊</span>Isolamento
</div>

<div class="card" onclick="abrirArea('Pintura')">
<span>🎨</span>Pintura
</div>

</div>

</div>

<!-- MESES -->

<div class="container hidden" id="mesesPage">

<h2 id="tituloArea"></h2>

<!-- 🔥 BOTÃO PDF -->
<button onclick="abrirMenuPDF()">📄 PDF</button>
<div id="menuPDF" style="margin-top:15px;"></div>

<div class="grid">

<div class="card" onclick="abrirMes('Janeiro')">Janeiro</div>
<div class="card" onclick="abrirMes('Fevereiro')">Fevereiro</div>
<div class="card" onclick="abrirMes('Marco')">Março</div>
<div class="card" onclick="abrirMes('Abril')">Abril</div>
<div class="card" onclick="abrirMes('Maio')">Maio</div>
<div class="card" onclick="abrirMes('Junho')">Junho</div>
<div class="card" onclick="abrirMes('Julho')">Julho</div>
<div class="card" onclick="abrirMes('Agosto')">Agosto</div>
<div class="card" onclick="abrirMes('Setembro')">Setembro</div>
<div class="card" onclick="abrirMes('Outubro')">Outubro</div>
<div class="card" onclick="abrirMes('Novembro')">Novembro</div>
<div class="card" onclick="abrirMes('Dezembro')">Dezembro</div>

</div>

</div>

<!-- RDO -->

<div class="container hidden" id="rdoPage">

<h2 id="tituloMes"></h2>

<button onclick="gerarPDFMes()">📄 Gerar PDF do mês</button>

<div class="gallery" id="listaRDOs"></div>

</div>

<script>

let areaAtual = ""
let mesAtual = ""

function atualizarBotaoVoltar(){
const btn = document.getElementById("btnVoltar")
btn.style.display = document.getElementById("areasPage").classList.contains("hidden") ? "block" : "none"
}

function abrirArea(area){
areaAtual = area
document.getElementById("areasPage").classList.add("hidden")
document.getElementById("mesesPage").classList.remove("hidden")
document.getElementById("tituloArea").innerText = area
atualizarBotaoVoltar()
}

function abrirMes(mes){
mesAtual = mes
document.getElementById("mesesPage").classList.add("hidden")
document.getElementById("rdoPage").classList.remove("hidden")
document.getElementById("tituloMes").innerText = areaAtual + " - " + mes
carregarRDOs()
atualizarBotaoVoltar()
}

function voltarPagina(){
if(!document.getElementById("rdoPage").classList.contains("hidden")){
document.getElementById("rdoPage").classList.add("hidden")
document.getElementById("mesesPage").classList.remove("hidden")
}else{
document.getElementById("mesesPage").classList.add("hidden")
document.getElementById("areasPage").classList.remove("hidden")
}
atualizarBotaoVoltar()
}

async function carregarRDOs(){

const lista = document.getElementById("listaRDOs")
lista.innerHTML = "Carregando..."

try{

const res = await fetch("/api/rdos")
const data = await res.json()

const ano = Object.keys(data)[0]

const normalizar = (txt) =>
txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase()

const areaKey = Object.keys(data[ano]).find(a => normalizar(a) === normalizar(areaAtual))
const mesKey = Object.keys(data[ano][areaKey]).find(m => normalizar(m) === normalizar(mesAtual))

const arquivos = data[ano][areaKey][mesKey]

lista.innerHTML = ""

arquivos.forEach(nome => {

let dataFormatada = nome.replace(/\.(pdf|jpg|jpeg|png)$/i, "")

let card = document.createElement("div")
card.classList.add("cardRDO")

card.innerHTML = `<h3>${dataFormatada}</h3>`

card.onclick = () => {
window.open(`/arquivos/${ano}/${areaKey}/${mesKey}/${encodeURIComponent(nome)}`)
}

lista.appendChild(card)

})

}catch{
lista.innerHTML = "Erro ao carregar"
}

}

function abrirMenuPDF(){

const menu = document.getElementById("menuPDF")

if(menu.innerHTML !== ""){
menu.innerHTML = ""
return
}

let meses = [
"Janeiro","Fevereiro","Marco","Abril","Maio","Junho",
"Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"
]

meses.forEach((mes,i)=>{

let proximo = meses[(i+1)%12]

let btn = document.createElement("button")
btn.innerText = `${mes} → ${proximo}`
btn.style.margin="5px"

btn.onclick = () => gerarPDFPeriodo(mes,proximo)

menu.appendChild(btn)

})

}

function normalizar(txt){
return txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase()
}

function gerarPDFPeriodo(m1, m2){

const url = `/api/pdf-periodo?area=${encodeURIComponent(areaAtual)}&mes1=${encodeURIComponent(normalizar(m1))}&mes2=${encodeURIComponent(normalizar(m2))}`

window.open(url, "_blank")

}

atualizarBotaoVoltar()



function gerarPDFMes(){
const url = `/api/pdf-mes?area=${encodeURIComponent(areaAtual)}&mes=${encodeURIComponent(normalizar(mesAtual))}`
window.open(url, "_blank")
}

</script>

</body>
</html>
