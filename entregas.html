<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Entregas RDO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#1f2329;
color:white;
text-align:center;
}

header{
background:#2b3038;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 18px rgba(0,0,0,0.5);
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
background:#3a3f48;
color:white;
}

button:hover{
background:#505662;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.area-buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:25px;
}

.area-btn{
background:#2b3038;
padding:25px;
border-radius:10px;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

.area-btn span{
display:block;
font-size:28px;
margin-bottom:8px;
}

.cards{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.card{
background:#2b3038;
padding:20px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
min-width:200px;
}

.calendar{
margin-top:40px;
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
background:#2b3038;
padding:16px;
border-radius:6px;
box-shadow:0 3px 10px rgba(0,0,0,0.4);
cursor:pointer;
}

.entregue{
background:#2f7d48;
}

.pendente{
background:#7d2f2f;
}

.fimSemana{
background:#3a3f48;
}

select{
padding:8px;
margin-top:15px;
border-radius:6px;
border:none;
background:#3a3f48;
color:white;
}

.futuro{
background:#2a2f36;
opacity:0.6;
cursor:default;
}

</style>
</head>

<body>

<header>

<h1>Painel de Entregas RDO</h1>

<button onclick="window.location.href='index.html'">Início</button>

</header>

<div class="container">

<h2>Selecione a área</h2>

<div class="area-buttons">

<div class="area-btn" onclick="selecionarArea('Civil')">
<span>🏗</span>Civil
</div>

<div class="area-btn" onclick="selecionarArea('laminacao')">
<span>🧵</span>Laminação
</div>

<div class="area-btn" onclick="selecionarArea('Isolamento')">
<span>🧊</span>Isolamento
</div>

<div class="area-btn" onclick="selecionarArea('Pintura')">
<span>🎨</span>Pintura
</div>

</div>

<div id="infoArea" style="display:none">

<h2 id="tituloArea" style="margin-top:30px;"></h2>

<select id="mesFiltro" onchange="gerarCalendario()">

<option>Janeiro</option>
<option>Fevereiro</option>
<option>Marco</option>
<option>Abril</option>
<option>Maio</option>
<option>Junho</option>
<option>Julho</option>
<option>Agosto</option>
<option>Setembro</option>
<option>Outubro</option>
<option>Novembro</option>
<option>Dezembro</option>

</select>

<div class="cards">

<div class="card">
<h3>RDO entregues</h3>
<p id="entregues"></p>
</div>

<div class="card">
<h3>Pendentes</h3>
<p id="pendentes"></p>
</div>

<div class="card">
<h3>Status</h3>
<p id="status"></p>
</div>

</div>

<div class="calendar" id="calendar"></div>

</div>

</div>

<script>

let areaAtual=""
let mesAtual=""

function selecionarArea(area){

areaAtual = area

document.getElementById("infoArea").style.display="block"
document.getElementById("tituloArea").innerText=area

mesAtual = document.getElementById("mesFiltro").value

gerarCalendario()

}

function gerarCalendario(){

mesAtual = document.getElementById("mesFiltro").value

fetch("/api/rdos")
.then(res=>res.json())
.then(data=>{

const ano = Object.keys(data)[0]

const areaKey = Object.keys(data[ano]).find(a => a.toLowerCase() === areaAtual.toLowerCase())
if(!areaKey) return

const mesKey = Object.keys(data[ano][areaKey]).find(m => m.toLowerCase() === mesAtual.toLowerCase())
if(!mesKey) return

const arquivos = data[ano][areaKey][mesKey]

// 🔥 pega dias do formato 03.03.pdf
let diasEntregues = arquivos.map(nome => parseInt(nome.split(".")[0]))

const calendar=document.getElementById("calendar")
calendar.innerHTML=""

let meses = [
"Janeiro","Fevereiro","Marco","Abril","Maio","Junho",
"Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"
]

let mesIndex = meses.findIndex(m => m.toLowerCase() === mesAtual.toLowerCase())

let diasNoMes = new Date(ano, mesIndex+1, 0).getDate()

let entreguesCount=0
let pendentesCount=0

let hoje = new Date()
let diaAtual = hoje.getDate()
let mesAtualNum = hoje.getMonth()
let anoAtual = hoje.getFullYear()

let isMesAtual = (mesIndex === mesAtualNum && ano == anoAtual)

let primeiroDia = new Date(ano, mesIndex, 1).getDay()

for(let i=0; i<primeiroDia; i++){
let vazio=document.createElement("div")
calendar.appendChild(vazio)
}

for(let d=1; d<=diasNoMes; d++){

let dataDia=new Date(ano,mesIndex,d)
let diaSemana=dataDia.getDay()

let div=document.createElement("div")
div.classList.add("day")
div.innerText=d

if(diaSemana==0 || diaSemana==6){

div.classList.add("fimSemana")

}else{

if(diasEntregues.includes(d)){

div.classList.add("entregue")
entreguesCount++

div.onclick = () => {
let arquivo = arquivos.find(a => a.startsWith(String(d).padStart(2,'0')))
if(arquivo){
window.open(`/arquivos/${ano}/${areaKey}/${mesKey}/${arquivo}`)
}
}

}else{

div.classList.add("pendente")
pendentesCount++

}

}

calendar.appendChild(div)

}

document.getElementById("entregues").innerText=entreguesCount
document.getElementById("pendentes").innerText=pendentesCount

let status=document.getElementById("status")

if(pendentesCount<=2){
status.innerHTML="<span style='color:#5cff8f'>Em dia</span>"
}else if(pendentesCount<=5){
status.innerHTML="<span style='color:#ffd84d'>Atenção</span>"
}else{
status.innerHTML="<span style='color:#ff5c5c'>Atrasado</span>"
}

})
.catch(()=>{
document.getElementById("calendar").innerHTML="Erro ao carregar dados"
})

}

</script>

</body>
</html>
