<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel de Entregas RDO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#1f2329;
color:white;
text-align:center;
min-height:100vh;
}

/* HEADER */
header{
background:#2b3038;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 18px rgba(0,0,0,0.5);
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
background:#3a3f48;
color:white;
transition:0.2s;
}

button:hover{
background:#505662;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

/* ÁREAS */
.area-buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:25px;
}

.area-btn{
background:#2b3038;
padding:25px;
border-radius:10px;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
transition:0.2s;
}

.area-btn:hover{
transform:translateY(-3px);
}

.area-btn span{
display:block;
font-size:28px;
margin-bottom:8px;
}

/* CARDS */
.cards{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.card{
background:#2b3038;
padding:20px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
min-width:200px;
}

/* SELECT */
select{
padding:8px;
margin-top:15px;
border-radius:6px;
border:none;
background:#3a3f48;
color:white;
}

/* CALENDÁRIO */
.calendar{
margin:20px auto;
display:grid;
grid-template-columns:repeat(7,minmax(0,1fr));
gap:6px;
max-width:420px;
}

.day{
background:#2b3038;
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
font-size:14px;
box-shadow:0 3px 10px rgba(0,0,0,0.4);
cursor:pointer;
transition:0.2s;
}

.day:active{
transform:scale(0.95);
}

.entregue{
background:#2d9b5f;
}

.pendente{
background:#a13a3a;
}

.fimSemana{
background:#3a3f48;
}

.futuro{
background:#2a2f36;
opacity:0.5;
cursor:default;
}

.hoje{
outline:2px solid #5cff8f;
}

/* 📱 MOBILE */
@media (max-width:768px){

header{
flex-direction:column;
padding:15px;
gap:10px;
}

header h1{
font-size:18px;
}

.container{
padding:20px 12px;
}

.area-buttons{
grid-template-columns:1fr 1fr;
gap:10px;
}

.area-btn{
padding:15px;
font-size:14px;
}

.area-btn span{
font-size:20px;
}

.cards{
flex-direction:column;
gap:10px;
}

.card{
width:100%;
padding:14px;
font-size:14px;
}

select{
width:100%;
padding:12px;
font-size:15px;
}

button{
width:100%;
margin-top:10px;
font-size:14px;
}

}

</style>
</head>

<body>

<header>
<h1>Painel de Entregas RDO</h1>
<button onclick="window.location.href='index.html'">Início</button>
</header>

<div class="container">

<h2>Selecione a área</h2>

<div class="area-buttons">

<div class="area-btn" onclick="selecionarArea('Civil')">
<span>🏗</span>Civil
</div>

<div class="area-btn" onclick="selecionarArea('laminacao')">
<span>🧵</span>Laminação
</div>

<div class="area-btn" onclick="selecionarArea('Isolamento')">
<span>🧊</span>Isolamento
</div>

<div class="area-btn" onclick="selecionarArea('Pintura')">
<span>🎨</span>Pintura
</div>

</div>

<div id="infoArea" style="display:none">

<h2 id="tituloArea" style="margin-top:30px;"></h2>

<select id="mesFiltro" onchange="gerarCalendario()">
<option>Janeiro</option>
<option>Fevereiro</option>
<option>Marco</option>
<option>Abril</option>
<option>Maio</option>
<option>Junho</option>
<option>Julho</option>
<option>Agosto</option>
<option>Setembro</option>
<option>Outubro</option>
<option>Novembro</option>
<option>Dezembro</option>
</select>

<div class="cards">

<div class="card">
<h3>RDO entregues</h3>
<p id="entregues"></p>
</div>

<div class="card">
<h3>Pendentes</h3>
<p id="pendentes"></p>
</div>

<div class="card">
<h3>Status</h3>
<p id="status"></p>
</div>

</div>

<div class="calendar" id="calendar"></div>

</div>

</div>

<script>

let areaAtual=""
let mesAtual=""

function selecionarArea(area){

areaAtual = area

document.getElementById("infoArea").style.display="block"
document.getElementById("tituloArea").innerText=area

mesAtual = document.getElementById("mesFiltro").value

gerarCalendario()
}

function gerarCalendario(){

mesAtual = document.getElementById("mesFiltro").value

fetch("/api/rdos")
.then(res=>res.json())
.then(data=>{

const ano = Object.keys(data)[0]

const areaKey = Object.keys(data[ano]).find(a => a.toLowerCase() === areaAtual.toLowerCase())
if(!areaKey) return

const mesKey = Object.keys(data[ano][areaKey]).find(m => m.toLowerCase() === mesAtual.toLowerCase())
if(!mesKey) return

const arquivos = data[ano][areaKey][mesKey]

let diasEntregues = arquivos.map(nome => {
let match = nome.match(/^(\d{2})/)
return match ? parseInt(match[1]) : null
}).filter(Boolean)

const calendar=document.getElementById("calendar")
calendar.innerHTML=""

let meses = [
"Janeiro","Fevereiro","Marco","Abril","Maio","Junho",
"Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"
]

let mesIndex = meses.findIndex(m => m.toLowerCase() === mesAtual.toLowerCase())
let diasNoMes = new Date(ano, mesIndex+1, 0).getDate()

let entreguesCount=0
let pendentesCount=0

let hoje = new Date()
let diaAtual = hoje.getDate()
let mesAtualNum = hoje.getMonth()
let anoAtual = hoje.getFullYear()

let isMesAtual = (mesIndex === mesAtualNum && ano == anoAtual)

let primeiroDia = new Date(ano, mesIndex, 1).getDay()

for(let i=0; i<primeiroDia; i++){
let vazio=document.createElement("div")
calendar.appendChild(vazio)
}

for(let d=1; d<=diasNoMes; d++){

let dataDia=new Date(ano,mesIndex,d)
let diaSemana=dataDia.getDay()

let div=document.createElement("div")
div.classList.add("day")
div.innerText=d

if(d === diaAtual && isMesAtual){
div.classList.add("hoje")
}

if(diaSemana==0 || diaSemana==6){

div.classList.add("fimSemana")

}else{

if(diasEntregues.includes(d)){

div.classList.add("entregue")
entreguesCount++

div.onclick = () => {
let arquivosDoDia = arquivos.filter(a => a.startsWith(String(d).padStart(2,'0')))

if(arquivosDoDia.length > 0){
window.open(`/arquivos/${ano}/${areaKey}/${mesKey}/${arquivosDoDia[0]}`)
}
}

}else{

if(isMesAtual && d > diaAtual){
div.classList.add("futuro")
}else{
div.classList.add("pendente")
pendentesCount++
}

}

}

calendar.appendChild(div)
}

document.getElementById("entregues").innerText=entreguesCount
document.getElementById("pendentes").innerText=pendentesCount

let status=document.getElementById("status")

if(pendentesCount<=2){
status.innerHTML="<span style='color:#5cff8f'>Em dia</span>"
}else if(pendentesCount<=5){
status.innerHTML="<span style='color:#ffd84d'>Atenção</span>"
}else{
status.innerHTML="<span style='color:#ff5c5c'>Atrasado</span>"
}

})
.catch(()=>{
document.getElementById("calendar").innerHTML="Erro ao carregar dados"
})

}

</script>

</body>
</html>
